name: Release

# Push tag vX.Y or vX.Y.Z pointing at a master commit → production APK on GitHub Releases.
on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build release APK + publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve version from tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          case "$TAG" in
            v*) VERSION="${TAG#v}" ;;
            *)
              echo "Tag must look like v1.2.3 (got: $TAG)"
              exit 1
              ;;
          esac

          if [[ ! "$VERSION" =~ ^[0-9]+(\.[0-9]+){1,2}$ ]]; then
            echo "VERSION must be X.Y or X.Y.Z (got: $VERSION)"
            exit 1
          fi

          # Production tags must land on master history.
          git fetch origin master
          if ! git merge-base --is-ancestor HEAD origin/master; then
            echo "Refusing to release: tag commit is not on origin/master"
            exit 1
          fi

          # versionCode: 2.1.3 -> 20103 ; 2.0 -> 20000
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          VERSION_CODE=$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))
          APK_NAME="TicTacToe-Offline-v${VERSION}.apk"

          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "version_code=$VERSION_CODE"
            echo "apk_name=$APK_NAME"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG version=$VERSION code=$VERSION_CODE apk=$APK_NAME"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Optional release keystore from secrets
        env:
          STORE_B64: ${{ secrets.RELEASE_STORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -n "${STORE_B64:-}" ]; then
            echo "$STORE_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "RELEASE_STORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "Using custom release keystore"
          else
            echo "No RELEASE_STORE_BASE64 secret; release APK will be debug-signed (sideload OK)"
          fi

      - name: Assemble release APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew assembleRelease --stacktrace \
            -PVERSION_NAME="${{ steps.ver.outputs.version }}" \
            -PVERSION_CODE="${{ steps.ver.outputs.version_code }}"

      - name: Name and verify APK
        id: apk
        run: |
          set -euo pipefail
          SRC=$(ls app/build/outputs/apk/release/*.apk | head -1)
          DEST="${{ steps.ver.outputs.apk_name }}"
          cp "$SRC" "$DEST"
          file "$DEST"
          AAPT=$(ls -1 "$ANDROID_HOME"/build-tools/*/aapt | sort -V | tail -1)
          "$AAPT" dump badging "$DEST" | tee /tmp/badging.txt
          grep -q "package: name='gr.ckaramolegkos.tictactoe'" /tmp/badging.txt
          grep -q "versionName='${{ steps.ver.outputs.version }}'" /tmp/badging.txt
          grep -q "launchable-activity: name='gr.ckaramolegkos.tictactoe.MainActivity'" /tmp/badging.txt
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "APK ready: $DEST ($(wc -c < "$DEST") bytes)"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: TicTacToe Offline ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
          body: |
            Production release of **TicTacToe Offline**.

            | | |
            |---|---|
            | Version | `${{ steps.ver.outputs.version }}` |
            | versionCode | `${{ steps.ver.outputs.version_code }}` |
            | Application ID | `gr.ckaramolegkos.tictactoe` |
            | APK | `${{ steps.ver.outputs.apk_name }}` |

            Download the APK asset to install (sideload).
