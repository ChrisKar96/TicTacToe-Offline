name: Release

# Push a version tag (vX.Y or vX.Y.Z) on a commit that is on master.
# Builds a release APK and publishes it to GitHub Releases.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v2.0.0). Leave empty to use the current ref when run from a tag.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    name: Build release APK + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
            git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" || true
            git checkout "tags/${TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          case "$TAG" in
            v*) VERSION="${TAG#v}" ;;
            *)
              echo "Tag must look like v1.2.3 (got: $TAG)"
              exit 1
              ;;
          esac

          if [[ ! "$VERSION" =~ ^[0-9]+(\.[0-9]+){1,2}$ ]]; then
            echo "VERSION must be X.Y or X.Y.Z (got: $VERSION)"
            exit 1
          fi

          # Ensure this commit is on master (production tags only).
          git fetch origin master
          if ! git merge-base --is-ancestor HEAD origin/master; then
            echo "Refusing to release: tag commit is not an ancestor of origin/master"
            exit 1
          fi

          # versionCode: 2.1.3 -> 20103 ; 2.0 -> 20000
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION}.0.0"
          VERSION_CODE=$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#${PATCH:-0}))

          APK_NAME="TicTacToe-Offline-v${VERSION}.apk"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG version=$VERSION code=$VERSION_CODE apk=$APK_NAME"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Optional release keystore
        if: ${{ secrets.RELEASE_STORE_BASE64 != '' }}
        env:
          RELEASE_STORE_BASE64: ${{ secrets.RELEASE_STORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$RELEASE_STORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Assemble release APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew assembleRelease --stacktrace \
            -PVERSION_NAME="${{ steps.ver.outputs.version }}" \
            -PVERSION_CODE="${{ steps.ver.outputs.version_code }}"

      - name: Name and verify APK
        id: apk
        run: |
          set -euo pipefail
          SRC=$(ls app/build/outputs/apk/release/*.apk | head -1)
          DEST="${{ steps.ver.outputs.apk_name }}"
          cp "$SRC" "$DEST"
          file "$DEST"
          AAPT=$(ls -1 "$ANDROID_HOME"/build-tools/*/aapt | sort -V | tail -1)
          "$AAPT" dump badging "$DEST" | tee /tmp/badging.txt
          grep -q "package: name='gr.ckaramolegkos.tictactoe'" /tmp/badging.txt
          grep -q "versionName='${{ steps.ver.outputs.version }}'" /tmp/badging.txt
          grep -q "launchable-activity: name='gr.ckaramolegkos.tictactoe.MainActivity'" /tmp/badging.txt
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "APK ready: $DEST"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: TicTacToe Offline ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
          body: |
            Production release build of **TicTacToe Offline**.

            | | |
            |---|---|
            | Version | `${{ steps.ver.outputs.version }}` |
            | versionCode | `${{ steps.ver.outputs.version_code }}` |
            | Application ID | `gr.ckaramolegkos.tictactoe` |
            | APK | `${{ steps.ver.outputs.apk_name }}` |

            Install by downloading the APK (sideload; enable install from unknown sources if needed).
