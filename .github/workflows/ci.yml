name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build APK + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew test --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Verify APK
        run: |
          set -euo pipefail
          apk=app/build/outputs/apk/debug/app-debug.apk
          test -f "$apk"
          file "$apk"
          # package name + launchable activity must match renamed app
          AAPT=$(ls -1 "$ANDROID_HOME"/build-tools/*/aapt | sort -V | tail -1)
          "$AAPT" dump badging "$apk" | tee /tmp/badging.txt
          grep -q "package: name='gr.ckaramolegkos.tictactoe'" /tmp/badging.txt
          grep -q "launchable-activity: name='gr.ckaramolegkos.tictactoe.MainActivity'" /tmp/badging.txt
          # APK is a zip with classes.dex and AndroidManifest
          unzip -l "$apk" | grep -q 'classes.dex'
          unzip -l "$apk" | grep -q 'AndroidManifest.xml'
          echo "APK verification OK"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
